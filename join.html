<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | She Can Foundation</title>
    <link rel="stylesheet" href="join.css">
</head>
<body>

<section class="join-section">
    <div class="join-container">

        <h1>Join Our Mission</h1>
        <p>
            Become a volunteer and help us empower women around the world.
            Share your skills, time, and passion to create meaningful change.
        </p>

        <form class="join-form" id="joinForm">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Skills</label>
                <input type="text" placeholder="Teaching, Design, Coding, Marketing..." required>
            </div>

            <div class="input-group">
                <label>Message</label>
                <textarea rows="5" placeholder="Tell us why you want to join"></textarea>
            </div>

            <button type="submit">Join Us Today</button>
            <p id="successMessage">
    🎉 Thank you for joining She Can Foundation! We will contact you soon.
            </p>

        </form>

    </div>
</section>
<script src="join.js"></script>

</body>
</html>
